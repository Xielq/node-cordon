apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-cordon
  namespace: ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-cordon
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-cordon
subjects:
  - kind: ServiceAccount
    name: node-cordon
    namespace: ops
roleRef:
  kind: ClusterRole
  name: node-cordon
  apiGroup: rbac.authorization.k8s.io
